<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login x DRE</title>

    <link rel="stylesheet" href="css/login.css" />
  </head>
  <body>
    <div class="dsc-status-banner dsc-hidden" id="status-banner"></div>
    <main class="dsc-access-page">
      <section id="login-section" class="dsc-container">
        <div class="dsc-access-layout">
          <div class="dsc-access-management-layout">
            <div class="dsc-access-toolbar">
              <form class="dsc-access-filter-form" id="login-dre-filter-form">
                <button type="button" class="dsc-btn dsc-btn-blue dsc-access-insert-button" id="insert-login-dre-button">Inserir registro</button>
                <button type="button" class="dsc-btn dsc-btn-white dsc-access-bulk-button" id="insert-login-dre-bulk-button">Vincular todas as DREs</button>
                <input class="dsc-form-control dsc-access-filter-input" id="login-dre-search" type="text" placeholder="Filtrar por login, nome, DRE ou descricao" />
                <button type="submit" class="dsc-btn dsc-btn-white">Filtrar</button>
                <button type="button" class="dsc-btn dsc-btn-white" id="clear-login-dre-filter-button">Limpar</button>
              </form>
            </div>

            <div class="dsc-popup-overlay dsc-hidden" id="login-dre-form-modal" aria-hidden="true">
              <div class="dsc-popup-shell dsc-popup-shell-ordem-servico" role="dialog" aria-modal="true" aria-labelledby="login-dre-form-title">
            <form class="dsc-card dsc-form dsc-access-form dsc-hidden" id="login-dre-form">
              <div class="dsc-popup-header dsc-popup-header-sticky">
                <h2 id="login-dre-form-title">LOGIN X DRE</h2>
                <button type="button" class="dsc-btn dsc-btn-white dsc-popup-compact-close-button" id="close-login-dre-form-modal-button" aria-label="Fechar formulario login x DRE">X</button>
              </div>

              <div class="dsc-form-row dsc-login-dre-form-row">
                <label class="dsc-field-group" for="login-codigo">
                  <span>Usuario</span>
                  <input class="dsc-form-control" id="login-codigo" type="text" list="login-codigo-options" placeholder="Digite para filtrar o usuario" />
                  <datalist id="login-codigo-options">
                    <option value=""></option>
                  </datalist>
                  <div class="dsc-form-error" id="login-codigo-error"></div>
                </label>

                <label class="dsc-field-group" for="login-nome">
                  <span>Nome do usuario</span>
                  <input class="dsc-form-control" id="login-nome" type="text" placeholder="Selecione um login" readonly disabled />
                </label>
              </div>

              <div class="dsc-form-row dsc-login-dre-form-row">
                <label class="dsc-field-group" for="dre-codigo">
                  <span>DRE</span>
                  <input class="dsc-form-control" id="dre-codigo" type="text" list="dre-codigo-options" placeholder="Digite para filtrar a DRE" />
                  <datalist id="dre-codigo-options">
                    <option value=""></option>
                  </datalist>
                  <div class="dsc-form-error" id="dre-codigo-error"></div>
                </label>

                <label class="dsc-field-group" for="dre-descricao">
                  <span>Descricao da DRE</span>
                  <input class="dsc-form-control" id="dre-descricao" type="text" placeholder="Selecione uma DRE" readonly disabled />
                </label>
              </div>

              <div class="dsc-login-form-buttons dsc-mt20 dsc-access-form-buttons dsc-popup-footer-sticky">
                <button type="submit" class="dsc-btn dsc-btn-blue" id="save-login-dre-button">Salvar relacionamento</button>
                <button type="button" class="dsc-btn dsc-btn-white" id="cancel-login-dre-button">Cancelar</button>
              </div>

              <p class="dsc-feedback" id="login-dre-form-feedback"></p>
            </form>
              </div>
            </div>

            <div class="dsc-popup-overlay dsc-hidden" id="login-dre-bulk-modal" aria-hidden="true">
              <div class="dsc-popup-shell dsc-popup-shell-ordem-servico" role="dialog" aria-modal="true" aria-labelledby="login-dre-bulk-title">
            <form class="dsc-card dsc-form dsc-access-form dsc-hidden" id="login-dre-bulk-form">
              <div class="dsc-popup-header dsc-popup-header-sticky">
                <h2 id="login-dre-bulk-title">VINCULAR DRES</h2>
                <button type="button" class="dsc-btn dsc-btn-white dsc-popup-compact-close-button" id="close-login-dre-bulk-modal-button" aria-label="Fechar vinculacao em massa de DRE">X</button>
              </div>

              <div class="dsc-form-row dsc-login-dre-form-row">
                <label class="dsc-field-group" for="bulk-login-codigo">
                  <span>Usuario</span>
                  <input class="dsc-form-control" id="bulk-login-codigo" type="text" list="bulk-login-codigo-options" placeholder="Digite para filtrar o usuario" />
                  <datalist id="bulk-login-codigo-options">
                    <option value=""></option>
                  </datalist>
                  <div class="dsc-form-error" id="bulk-login-codigo-error"></div>
                </label>

                <label class="dsc-field-group" for="bulk-login-nome">
                  <span>Nome do usuario</span>
                  <input class="dsc-form-control" id="bulk-login-nome" type="text" placeholder="Selecione um login" readonly disabled />
                </label>
              </div>

              <p class="dsc-form-hint">A operacao gravara apenas as DREs ainda nao vinculadas ao usuario escolhido.</p>

              <div class="dsc-login-form-buttons dsc-mt20 dsc-access-form-buttons dsc-popup-footer-sticky">
                <button type="submit" class="dsc-btn dsc-btn-blue" id="save-login-dre-bulk-button">Gravar todas as DREs</button>
                <button type="button" class="dsc-btn dsc-btn-white" id="cancel-login-dre-bulk-button">Cancelar</button>
              </div>

              <p class="dsc-feedback" id="login-dre-bulk-feedback"></p>
            </form>
              </div>
            </div>

            <div class="dsc-card dsc-access-grid-card">
              <div class="dsc-access-grid-header" style="align-items: flex-start; justify-content: space-between; flex-direction: row;">
                <div class="dsc-access-grid-header-copy">
                  <h2>Relacionamentos cadastrados</h2>
                  <span id="login-dre-total"></span>
                </div>
                <div class="dsc-grid-page-size-field" style="flex-direction: column; align-items: flex-end; justify-content: flex-start; margin-left: auto;">
                  <span class="dsc-grid-page-size-label">Registros no grid</span>
                  <select class="dsc-form-control" id="login-dre-page-size" style="padding: 0; min-height: 38px; border-radius: 14px;">
                    <option value="10">10</option>
                    <option value="20">20</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                    <option value="200">200</option>
                  </select>
                </div>
              </div>

              <div class="dsc-access-grid-wrapper">
                <table class="dsc-access-grid">
                  <thead>
                    <tr>
                      <th>
                        <button type="button" class="dsc-grid-sort-button" id="sort-login-codigo-button">
                          Login <span id="sort-login-codigo-indicator">↑</span>
                        </button>
                      </th>
                      <th>Nome</th>
                      <th>
                        <button type="button" class="dsc-grid-sort-button" id="sort-dre-codigo-button">
                          DRE <span id="sort-dre-codigo-indicator">↕</span>
                        </button>
                      </th>
                      <th>Descricao</th>
                      <th class="dsc-grid-actions-column">Acoes</th>
                    </tr>
                  </thead>
                  <tbody id="login-dre-grid-body"></tbody>
                </table>

                <p class="dsc-empty-state dsc-hidden" id="login-dre-empty-state">Nenhum relacionamento encontrado.</p>
              </div>

              <p class="dsc-feedback" id="login-dre-grid-feedback"></p>

              <div class="dsc-access-pagination">
                <button type="button" class="dsc-btn dsc-btn-white" id="first-login-dre-page-button" title="Primeiro registro">|◀</button>
                <button type="button" class="dsc-btn dsc-btn-white" id="previous-login-dre-page-button" title="Registro anterior">◀</button>
                <span id="login-dre-pagination-info">Pagina 1 de 1</span>
                <button type="button" class="dsc-btn dsc-btn-white" id="next-login-dre-page-button" title="Proximo registro">▶</button>
                <button type="button" class="dsc-btn dsc-btn-white" id="last-login-dre-page-button" title="Ultimo registro">▶|</button>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script>
      const formModal = document.getElementById('login-dre-form-modal');
      const bulkFormModal = document.getElementById('login-dre-bulk-modal');
      const form = document.getElementById('login-dre-form');
      const bulkForm = document.getElementById('login-dre-bulk-form');
      const loginCodigoSelect = document.getElementById('login-codigo');
      const loginCodigoOptions = document.getElementById('login-codigo-options');
      const loginNomeInput = document.getElementById('login-nome');
      const dreCodigoSelect = document.getElementById('dre-codigo');
      const dreCodigoOptions = document.getElementById('dre-codigo-options');
      const dreDescricaoInput = document.getElementById('dre-descricao');
      const bulkLoginCodigoSelect = document.getElementById('bulk-login-codigo');
      const bulkLoginCodigoOptions = document.getElementById('bulk-login-codigo-options');
      const bulkLoginNomeInput = document.getElementById('bulk-login-nome');
      const loginCodigoError = document.getElementById('login-codigo-error');
      const dreCodigoError = document.getElementById('dre-codigo-error');
      const bulkLoginCodigoError = document.getElementById('bulk-login-codigo-error');
      const formFeedback = document.getElementById('login-dre-form-feedback');
      const bulkFeedback = document.getElementById('login-dre-bulk-feedback');
      const gridFeedback = document.getElementById('login-dre-grid-feedback');
      const insertButton = document.getElementById('insert-login-dre-button');
      const bulkInsertButton = document.getElementById('insert-login-dre-bulk-button');
      const cancelButton = document.getElementById('cancel-login-dre-button');
      const bulkCancelButton = document.getElementById('cancel-login-dre-bulk-button');
      const closeFormModalButton = document.getElementById('close-login-dre-form-modal-button');
      const closeBulkModalButton = document.getElementById('close-login-dre-bulk-modal-button');
      const filterForm = document.getElementById('login-dre-filter-form');
      const clearFilterButton = document.getElementById('clear-login-dre-filter-button');
      const searchInput = document.getElementById('login-dre-search');
      const gridBody = document.getElementById('login-dre-grid-body');
      const emptyState = document.getElementById('login-dre-empty-state');
      const totalLabel = document.getElementById('login-dre-total');
      const firstPageButton = document.getElementById('first-login-dre-page-button');
      const previousPageButton = document.getElementById('previous-login-dre-page-button');
      const nextPageButton = document.getElementById('next-login-dre-page-button');
      const lastPageButton = document.getElementById('last-login-dre-page-button');
      const paginationInfo = document.getElementById('login-dre-pagination-info');
      const pageSizeSelect = document.getElementById('login-dre-page-size');
      const sortLoginCodigoButton = document.getElementById('sort-login-codigo-button');
      const sortLoginCodigoIndicator = document.getElementById('sort-login-codigo-indicator');
      const sortDreCodigoButton = document.getElementById('sort-dre-codigo-button');
      const sortDreCodigoIndicator = document.getElementById('sort-dre-codigo-indicator');
      const formTitle = document.getElementById('login-dre-form-title');
      const saveButton = document.getElementById('save-login-dre-button');
      const statusBanner = document.getElementById('status-banner');

      let pageSize = 20;
      let currentPage = 1;
      let totalPages = 1;
      let currentSearch = '';
      let currentSortBy = 'login_codigo';
      let currentSortDirection = 'asc';
      let useTailPageFetch = false;
      let previousPageCursor = null;
      let nextPageCursor = null;
      let currentGridItems = [];
      let editingPair = null;
      let bannerTimeoutId = null;
      let loginOptions = [];
      let dreOptions = [];
      let selectedLoginCodigo = '';
      let selectedDreCodigo = '';
      let selectedBulkLoginCodigo = '';

      const resetMessages = () => {
        loginCodigoError.textContent = '';
        dreCodigoError.textContent = '';
        formFeedback.textContent = '';
        formFeedback.className = 'dsc-feedback';
      };

      const resetBulkMessages = () => {
        bulkLoginCodigoError.textContent = '';
        bulkFeedback.textContent = '';
        bulkFeedback.className = 'dsc-feedback';
      };

      const setGridMessage = (message, tone = '') => {
        gridFeedback.textContent = message;
        gridFeedback.className = 'dsc-feedback';
        if (tone) {
          gridFeedback.classList.add(`dsc-feedback-${tone}`);
        }
      };

      const showBanner = (message, tone = 'success') => {
        if (bannerTimeoutId) {
          window.clearTimeout(bannerTimeoutId);
        }

        statusBanner.textContent = message;
        statusBanner.className = `dsc-status-banner dsc-status-banner-${tone}`;

        bannerTimeoutId = window.setTimeout(() => {
          statusBanner.className = 'dsc-status-banner dsc-hidden';
          statusBanner.textContent = '';
        }, 3500);
      };

      const readJsonResponse = async (response) => {
        const rawBody = await response.text();

        if (!rawBody) {
          throw new Error('Resposta vazia do servidor.');
        }

        try {
          return JSON.parse(rawBody);
        } catch {
          throw new Error('Resposta invalida do servidor.');
        }
      };

      const getRequestErrorMessage = (error, fallbackMessage) => {
        if (error instanceof TypeError) {
          return 'API indisponivel. Confirme se o backend esta em execucao na porta 3001.';
        }

        if (error instanceof Error && ['Resposta vazia do servidor.', 'Resposta invalida do servidor.'].includes(error.message)) {
          return 'API indisponivel ou respondeu de forma incompleta. Confirme se o backend esta em execucao na porta 3001.';
        }

        return error instanceof Error ? error.message : fallbackMessage;
      };

      const normalizeKey = (value) => (value || '')
        .trim()
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-z0-9]/g, '');

      const buildOptionLabel = (item, labelField) => `${item.codigo} - ${item[labelField]}`;

      const findSelectedItem = (rawValue, items, labelField) => {
        const normalizedValue = String(rawValue || '').trim();

        if (!normalizedValue) {
          return null;
        }

        return items.find((item) => {
          const optionLabel = buildOptionLabel(item, labelField);

          return item.codigo === normalizedValue
            || normalizeKey(optionLabel) === normalizeKey(normalizedValue)
            || normalizeKey(item[labelField]) === normalizeKey(normalizedValue);
        }) || null;
      };

      const renderAutocompleteOptions = ({ inputElement, listElement, items, labelField, selectedValue }) => {
        const selectedItem = items.find((item) => item.codigo === selectedValue) || null;
        const currentInputValue = selectedItem ? buildOptionLabel(selectedItem, labelField) : String(inputElement.value || '').trim();
        const searchKey = normalizeKey(currentInputValue);
        const filteredItems = searchKey
          ? items.filter((item) => {
              const optionLabel = buildOptionLabel(item, labelField);
              return normalizeKey(optionLabel).includes(searchKey)
                || normalizeKey(item[labelField]).includes(searchKey)
                || String(item.codigo).includes(currentInputValue);
            })
          : items;

        listElement.innerHTML = '<option value=""></option>';

        filteredItems.forEach((item) => {
          const option = document.createElement('option');
          option.value = buildOptionLabel(item, labelField);
          listElement.appendChild(option);
        });

        inputElement.value = currentInputValue;
      };

      const syncBulkLoginDetails = () => {
        const selected = findSelectedItem(bulkLoginCodigoSelect.value, loginOptions, 'nome');
        selectedBulkLoginCodigo = selected ? selected.codigo : '';
        bulkLoginNomeInput.value = selected ? selected.nome : '';
        renderAutocompleteOptions({
          inputElement: bulkLoginCodigoSelect,
          listElement: bulkLoginCodigoOptions,
          items: loginOptions,
          labelField: 'nome',
          selectedValue: selectedBulkLoginCodigo,
        });

        if (selectedBulkLoginCodigo) {
          bulkLoginCodigoError.textContent = '';
        }
      };

      const syncLoginDetails = () => {
        const selected = findSelectedItem(loginCodigoSelect.value, loginOptions, 'nome');
        selectedLoginCodigo = selected ? selected.codigo : '';
        loginNomeInput.value = selected ? selected.nome : '';
        renderAutocompleteOptions({
          inputElement: loginCodigoSelect,
          listElement: loginCodigoOptions,
          items: loginOptions,
          labelField: 'nome',
          selectedValue: selectedLoginCodigo,
        });

        if (selectedLoginCodigo) {
          loginCodigoError.textContent = '';
        }
      };

      const syncDreDetails = () => {
        const selected = findSelectedItem(dreCodigoSelect.value, dreOptions, 'descricao');
        selectedDreCodigo = selected ? selected.codigo : '';
        dreDescricaoInput.value = selected ? selected.descricao : '';
        renderAutocompleteOptions({
          inputElement: dreCodigoSelect,
          listElement: dreCodigoOptions,
          items: dreOptions,
          labelField: 'descricao',
          selectedValue: selectedDreCodigo,
        });

        if (selectedDreCodigo) {
          dreCodigoError.textContent = '';
        }
      };

      const loadOptions = async () => {
        const response = await fetch('/api/login-dre/options', { headers: { Accept: 'application/json' } });
        const payload = await readJsonResponse(response);

        if (!response.ok) {
          throw new Error(payload.message || 'Falha ao carregar opcoes.');
        }

        loginOptions = payload.loginOptions || [];
        dreOptions = payload.dreOptions || [];
        renderAutocompleteOptions({ inputElement: loginCodigoSelect, listElement: loginCodigoOptions, items: loginOptions, labelField: 'nome', selectedValue: selectedLoginCodigo });
        renderAutocompleteOptions({ inputElement: bulkLoginCodigoSelect, listElement: bulkLoginCodigoOptions, items: loginOptions, labelField: 'nome', selectedValue: selectedBulkLoginCodigo });
        renderAutocompleteOptions({ inputElement: dreCodigoSelect, listElement: dreCodigoOptions, items: dreOptions, labelField: 'descricao', selectedValue: selectedDreCodigo });
        syncLoginDetails();
        syncBulkLoginDetails();
        syncDreDetails();
      };

      const setFormReadOnly = (isReadOnly) => {
        loginCodigoSelect.readOnly = isReadOnly;
        dreCodigoSelect.readOnly = isReadOnly;
        loginCodigoSelect.disabled = isReadOnly;
        dreCodigoSelect.disabled = isReadOnly;
        saveButton.classList.toggle('dsc-hidden', isReadOnly);
      };

      const setPopupVisibility = (modalElement, shouldShow) => {
        modalElement.classList.toggle('dsc-hidden', !shouldShow);
        modalElement.setAttribute('aria-hidden', shouldShow ? 'false' : 'true');
      };

      const syncPopupPageState = () => {
        const isPopupVisible = !formModal.classList.contains('dsc-hidden') || !bulkFormModal.classList.contains('dsc-hidden');
        document.body.classList.toggle('dsc-popup-open', isPopupVisible);
      };

      const showForm = (mode = 'create') => {
        const isEditing = mode === 'edit';
        const isReadOnly = mode === 'view';

        formMode = mode;
        bulkForm.classList.add('dsc-hidden');
        setPopupVisibility(bulkFormModal, false);
        form.classList.remove('dsc-hidden');
        setPopupVisibility(formModal, true);
        syncPopupPageState();
        formTitle.textContent = 'LOGIN X DRE';
        saveButton.textContent = isEditing ? 'Salvar alteracao' : 'Salvar relacionamento';
        setFormReadOnly(isReadOnly);
      };

      const showBulkForm = () => {
        form.classList.add('dsc-hidden');
        setPopupVisibility(formModal, false);
        bulkForm.classList.remove('dsc-hidden');
        setPopupVisibility(bulkFormModal, true);
        syncPopupPageState();
      };

      const hideForm = () => {
        form.classList.add('dsc-hidden');
        setPopupVisibility(formModal, false);
        syncPopupPageState();
        form.reset();
        editingPair = null;
        formMode = 'create';
        selectedLoginCodigo = '';
        selectedDreCodigo = '';
        loginCodigoSelect.value = '';
        dreCodigoSelect.value = '';
        setFormReadOnly(false);
        syncLoginDetails();
        syncDreDetails();
        resetMessages();
      };

      const hideBulkForm = () => {
        bulkForm.classList.add('dsc-hidden');
        setPopupVisibility(bulkFormModal, false);
        syncPopupPageState();
        bulkForm.reset();
        selectedBulkLoginCodigo = '';
        bulkLoginCodigoSelect.value = '';
        syncBulkLoginDetails();
        resetBulkMessages();
      };

      const buildUrl = () => {
        const params = new URLSearchParams({
          page: String(currentPage),
          pageSize: String(pageSize),
          sortBy: currentSortBy,
          sortDirection: currentSortDirection,
        });

        if (currentSearch) {
          params.set('search', currentSearch);
        }

        if (useTailPageFetch) {
          params.set('tail', '1');
        }

        if (previousPageCursor) {
          params.set('beforeLoginCodigo', previousPageCursor.loginCodigo);
          params.set('beforeDreCodigo', previousPageCursor.dreCodigo);
        }

        if (nextPageCursor) {
          params.set('afterLoginCodigo', nextPageCursor.loginCodigo);
          params.set('afterDreCodigo', nextPageCursor.dreCodigo);
        }

        return `/api/login-dre?${params.toString()}`;
      };

      const renderGrid = (items) => {
        currentGridItems = items;
        gridBody.innerHTML = '';

        if (!items.length) {
          emptyState.classList.remove('dsc-hidden');
          return;
        }

        emptyState.classList.add('dsc-hidden');

        items.forEach((item) => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${item.login_codigo}</td>
            <td>${item.login_nome}</td>
            <td>${item.dre_codigo}</td>
            <td>${item.dre_descricao}</td>
            <td>
              <div class="dsc-grid-actions">
                <button type="button" class="dsc-grid-action-button" data-action="view" data-login-codigo="${item.login_codigo}" data-dre-codigo="${item.dre_codigo}">Consulta</button>
                <button type="button" class="dsc-grid-action-button dsc-grid-action-edit" data-action="edit" data-login-codigo="${item.login_codigo}" data-dre-codigo="${item.dre_codigo}">Alterar</button>
                <button type="button" class="dsc-grid-action-button dsc-grid-action-delete" data-action="delete" data-login-codigo="${item.login_codigo}" data-dre-codigo="${item.dre_codigo}" data-login-nome="${item.login_nome}" data-dre-descricao="${item.dre_descricao}">Excluir</button>
              </div>
            </td>
          `;
          gridBody.appendChild(row);
        });
      };

      const updatePagination = (totalItems) => {
        totalLabel.textContent = `${totalItems} item(ns) encontrados`;
        paginationInfo.textContent = `Pagina ${currentPage} de ${totalPages}`;
        firstPageButton.disabled = currentPage <= 1;
        previousPageButton.disabled = currentPage <= 1;
        nextPageButton.disabled = currentPage >= totalPages;
        lastPageButton.disabled = currentPage >= totalPages;
        if (pageSizeSelect) {
          pageSizeSelect.value = String(pageSize);
        }
        sortLoginCodigoIndicator.textContent = currentSortBy === 'login_codigo' ? (currentSortDirection === 'asc' ? '↑' : '↓') : '↕';
        sortDreCodigoIndicator.textContent = currentSortBy === 'dre_codigo' ? (currentSortDirection === 'asc' ? '↑' : '↓') : '↕';
      };

      const loadItems = async () => {
        setGridMessage('Carregando relacionamentos...');
        const requestUrl = buildUrl();
        useTailPageFetch = false;
        previousPageCursor = null;
        nextPageCursor = null;

        try {
          const response = await fetch(requestUrl, { headers: { Accept: 'application/json' } });
          const payload = await readJsonResponse(response);

          if (!response.ok) {
            throw new Error(payload.message || 'Falha ao carregar relacionamentos.');
          }

          totalPages = payload.totalPages || 1;
          currentPage = payload.page || 1;
          renderGrid(payload.items || []);
          updatePagination(payload.total || 0);
          setGridMessage(payload.items && payload.items.length ? '' : 'Nenhum relacionamento encontrado.');
        } catch (error) {
          gridBody.innerHTML = '';
          emptyState.classList.remove('dsc-hidden');
          setGridMessage(getRequestErrorMessage(error, 'Falha ao carregar relacionamentos.'), 'error');
        }
      };

      const startInsert = () => {
        hideBulkForm();
        editingPair = null;
        form.reset();
        selectedLoginCodigo = '';
        selectedDreCodigo = '';
        loginCodigoSelect.value = '';
        dreCodigoSelect.value = '';
        syncLoginDetails();
        syncDreDetails();
        resetMessages();
        showForm('create');
      };

      const startBulkInsert = () => {
        hideForm();
        bulkForm.reset();
        selectedBulkLoginCodigo = '';
        bulkLoginCodigoSelect.value = '';
        syncBulkLoginDetails();
        resetBulkMessages();
        showBulkForm();
      };

      const startEdit = (item) => {
        editingPair = { loginCodigo: item.loginCodigo, dreCodigo: item.dreCodigo };
        selectedLoginCodigo = item.loginCodigo;
        selectedDreCodigo = item.dreCodigo;
        loginCodigoSelect.value = item.loginCodigo;
        dreCodigoSelect.value = item.dreCodigo;
        syncLoginDetails();
        syncDreDetails();
        resetMessages();
        showForm('edit');
      };

      const startView = (item) => {
        editingPair = { loginCodigo: item.loginCodigo, dreCodigo: item.dreCodigo };
        selectedLoginCodigo = item.loginCodigo;
        selectedDreCodigo = item.dreCodigo;
        loginCodigoSelect.value = item.loginCodigo;
        dreCodigoSelect.value = item.dreCodigo;
        syncLoginDetails();
        syncDreDetails();
        resetMessages();
        showForm('view');
      };

      const handleDelete = async (item) => {
        if (!window.confirm(`Excluir o relacionamento Login ${item.loginCodigo} x DRE ${item.dreCodigo}?`)) {
          return;
        }

        setGridMessage(`Excluindo relacionamento ${item.loginCodigo} x ${item.dreCodigo}...`);

        try {
          const response = await fetch(`/api/login-dre/${encodeURIComponent(item.loginCodigo)}/${encodeURIComponent(item.dreCodigo)}`, {
            method: 'DELETE',
            headers: { Accept: 'application/json' },
          });
          const payload = await readJsonResponse(response);

          if (!response.ok) {
            throw new Error(payload.message || 'Falha ao excluir relacionamento.');
          }

          setGridMessage('Relacionamento excluido com sucesso.', 'success');
          showBanner(`Relacionamento ${item.loginCodigo} x ${item.dreCodigo} excluido com sucesso.`, 'success');
          if (editingPair && editingPair.loginCodigo === item.loginCodigo && editingPair.dreCodigo === item.dreCodigo) {
            hideForm();
          }
          await loadItems();
        } catch (error) {
          const message = getRequestErrorMessage(error, 'Falha ao excluir relacionamento.');
          setGridMessage(message, 'error');
          showBanner(message, 'error');
        }
      };

      gridBody.addEventListener('click', (event) => {
        const target = event.target;

        if (!(target instanceof HTMLButtonElement)) {
          return;
        }

        const action = target.dataset.action;
        const loginCodigo = target.dataset.loginCodigo;
        const dreCodigo = target.dataset.dreCodigo;

        if (!loginCodigo || !dreCodigo) {
          return;
        }

        if (action === 'view') {
          startView({ loginCodigo, dreCodigo });
          return;
        }

        if (action === 'edit') {
          startEdit({ loginCodigo, dreCodigo });
          return;
        }

        if (action === 'delete') {
          void handleDelete({ loginCodigo, dreCodigo });
        }
      });

      loginCodigoSelect.addEventListener('input', syncLoginDetails);
      dreCodigoSelect.addEventListener('input', syncDreDetails);
      bulkLoginCodigoSelect.addEventListener('input', syncBulkLoginDetails);
      loginCodigoSelect.addEventListener('input', () => {
        formFeedback.textContent = '';
        formFeedback.className = 'dsc-feedback';
      });
      dreCodigoSelect.addEventListener('input', () => {
        formFeedback.textContent = '';
        formFeedback.className = 'dsc-feedback';
      });
      bulkLoginCodigoSelect.addEventListener('input', () => {
        bulkFeedback.textContent = '';
        bulkFeedback.className = 'dsc-feedback';
      });

      form.addEventListener('submit', async (event) => {
        event.preventDefault();

        const loginCodigo = selectedLoginCodigo;
        const dreCodigo = selectedDreCodigo;
        let hasError = false;

        resetMessages();

        if (formMode === 'view') {
          formFeedback.textContent = 'Consulta em modo somente leitura.';
          return;
        }

        if (!loginCodigo) {
          loginCodigoError.textContent = 'Selecione o usuario.';
          hasError = true;
        }

        if (!dreCodigo) {
          dreCodigoError.textContent = 'Selecione a DRE.';
          hasError = true;
        }

        if (hasError) {
          formFeedback.textContent = 'Corrija os campos para continuar.';
          formFeedback.classList.add('dsc-feedback-error');
          return;
        }

        try {
          const endpoint = editingPair
            ? `/api/login-dre/${encodeURIComponent(editingPair.loginCodigo)}/${encodeURIComponent(editingPair.dreCodigo)}`
            : '/api/login-dre';
          const response = await fetch(endpoint, {
            method: editingPair ? 'PUT' : 'POST',
            headers: {
              'Content-Type': 'application/json',
              Accept: 'application/json',
            },
            body: JSON.stringify({ loginCodigo, dreCodigo }),
          });

          const payload = await readJsonResponse(response);

          if (!response.ok) {
            throw new Error(payload.message || 'Falha ao gravar relacionamento.');
          }

          const savedItem = payload.item;
          formFeedback.textContent = editingPair
            ? `Relacionamento ${savedItem.login_codigo} x ${savedItem.dre_codigo} alterado com sucesso.`
            : `Relacionamento ${savedItem.login_codigo} x ${savedItem.dre_codigo} gravado com sucesso.`;
          formFeedback.classList.add('dsc-feedback-success');
          showBanner(formFeedback.textContent, 'success');
          hideForm();
          await loadItems();
        } catch (error) {
          const message = getRequestErrorMessage(error, 'Falha ao gravar relacionamento.');
          formFeedback.textContent = message;
          formFeedback.classList.add('dsc-feedback-error');
          showBanner(message, 'error');
        }
      });

      bulkForm.addEventListener('submit', async (event) => {
        event.preventDefault();

        const loginCodigo = selectedBulkLoginCodigo;
        resetBulkMessages();

        if (!loginCodigo) {
          bulkLoginCodigoError.textContent = 'Selecione o usuario.';
          bulkFeedback.textContent = 'Escolha um usuario para continuar.';
          bulkFeedback.classList.add('dsc-feedback-error');
          return;
        }

        const selectedLogin = loginOptions.find((item) => item.codigo === loginCodigo);
        const loginLabel = selectedLogin ? `${selectedLogin.codigo} - ${selectedLogin.nome}` : loginCodigo;
        const confirmed = window.confirm(`Confirmar a gravacao de todas as DREs ainda nao vinculadas para o usuario ${loginLabel}?`);

        if (!confirmed) {
          return;
        }

        try {
          const response = await fetch('/api/login-dre/assign-all', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              Accept: 'application/json',
            },
            body: JSON.stringify({ loginCodigo }),
          });
          const payload = await readJsonResponse(response);

          if (!response.ok) {
            throw new Error(payload.message || 'Falha ao vincular DREs ao usuario.');
          }

          const summary = payload.item;
          const message = summary.inserted_dres > 0
            ? `${summary.inserted_dres} DRE(s) gravada(s) para ${summary.login_nome}.`
            : `Nenhuma nova DRE foi gravada para ${summary.login_nome}.`;

          bulkFeedback.textContent = `${message} Ja existiam ${summary.existing_dres} vinculacao(oes) para um total de ${summary.total_dres} DRE(s).`;
          bulkFeedback.classList.add('dsc-feedback-success');
          showBanner(payload.message || message, 'success');
          hideBulkForm();
          await loadItems();
        } catch (error) {
          const message = getRequestErrorMessage(error, 'Falha ao vincular DREs ao usuario.');
          bulkFeedback.textContent = message;
          bulkFeedback.classList.add('dsc-feedback-error');
          showBanner(message, 'error');
        }
      });

      insertButton.addEventListener('click', startInsert);
      bulkInsertButton.addEventListener('click', startBulkInsert);
      cancelButton.addEventListener('click', hideForm);
      bulkCancelButton.addEventListener('click', hideBulkForm);
      closeFormModalButton.addEventListener('click', hideForm);
      closeBulkModalButton.addEventListener('click', hideBulkForm);
      [formModal, bulkFormModal].forEach((modalElement) => {
        modalElement.addEventListener('click', (event) => {
          if (event.target !== modalElement) {
            return;
          }

          if (modalElement === formModal) {
            hideForm();
            return;
          }

          hideBulkForm();
        });
      });
      document.addEventListener('keydown', (event) => {
        if (event.key !== 'Escape') {
          return;
        }

        if (!formModal.classList.contains('dsc-hidden')) {
          hideForm();
          return;
        }

        if (!bulkFormModal.classList.contains('dsc-hidden')) {
          hideBulkForm();
        }
      });

      filterForm.addEventListener('submit', (event) => {
        event.preventDefault();
        currentSearch = searchInput.value.trim();
        currentPage = 1;
        useTailPageFetch = false;
        previousPageCursor = null;
        nextPageCursor = null;
        void loadItems();
      });

      clearFilterButton.addEventListener('click', () => {
        searchInput.value = '';
        currentSearch = '';
        currentPage = 1;
        useTailPageFetch = false;
        previousPageCursor = null;
        nextPageCursor = null;
        void loadItems();
      });

      firstPageButton.addEventListener('click', () => {
        if (currentPage <= 1) {
          return;
        }

        currentPage = 1;
        useTailPageFetch = false;
        previousPageCursor = null;
        nextPageCursor = null;
        void loadItems();
      });

      previousPageButton.addEventListener('click', () => {
        if (currentPage <= 1) {
          return;
        }

        currentPage -= 1;
        useTailPageFetch = false;
        nextPageCursor = null;
        previousPageCursor = currentSortBy === 'login_codigo' && currentSortDirection === 'asc' && currentGridItems.length
          ? {
              loginCodigo: String(currentGridItems[0]?.login_codigo || ''),
              dreCodigo: String(currentGridItems[0]?.dre_codigo || ''),
            }
          : null;
        void loadItems();
      });

      nextPageButton.addEventListener('click', () => {
        if (currentPage >= totalPages) {
          return;
        }

        currentPage += 1;
        useTailPageFetch = false;
        previousPageCursor = null;
        nextPageCursor = currentSortBy === 'login_codigo' && currentSortDirection === 'asc' && currentGridItems.length
          ? {
              loginCodigo: String(currentGridItems[currentGridItems.length - 1]?.login_codigo || ''),
              dreCodigo: String(currentGridItems[currentGridItems.length - 1]?.dre_codigo || ''),
            }
          : null;
        void loadItems();
      });

      lastPageButton.addEventListener('click', () => {
        if (currentPage >= totalPages) {
          return;
        }

        currentPage = totalPages;
        useTailPageFetch = currentSortBy === 'login_codigo' && currentSortDirection === 'asc';
        previousPageCursor = null;
        nextPageCursor = null;
        void loadItems();
      });

      pageSizeSelect?.addEventListener('change', () => {
        const nextPageSize = Number.parseInt(pageSizeSelect.value, 10);

        if (!Number.isFinite(nextPageSize) || nextPageSize <= 0) {
          pageSizeSelect.value = String(pageSize);
          return;
        }

        pageSize = nextPageSize;
        currentPage = 1;
        useTailPageFetch = false;
        previousPageCursor = null;
        nextPageCursor = null;
        void loadItems();
      });

      sortLoginCodigoButton.addEventListener('click', () => {
        currentSortDirection = currentSortBy === 'login_codigo' && currentSortDirection === 'asc' ? 'desc' : 'asc';
        currentSortBy = 'login_codigo';
        currentPage = 1;
        useTailPageFetch = false;
        previousPageCursor = null;
        nextPageCursor = null;
        void loadItems();
      });

      sortDreCodigoButton.addEventListener('click', () => {
        currentSortDirection = currentSortBy === 'dre_codigo' && currentSortDirection === 'asc' ? 'desc' : 'asc';
        currentSortBy = 'dre_codigo';
        currentPage = 1;
        useTailPageFetch = false;
        previousPageCursor = null;
        nextPageCursor = null;
        void loadItems();
      });

      hideForm();
      hideBulkForm();
      Promise.all([loadOptions(), loadItems()]).catch((error) => {
        const message = error instanceof Error ? error.message : 'Falha ao inicializar tela login x DRE.';
        setGridMessage(message, 'error');
      });
    </script>
  </body>
</html>
