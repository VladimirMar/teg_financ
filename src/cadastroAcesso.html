<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro de acesso</title>

    <link rel="stylesheet" href="css/login.css" />
  </head>
  <body>
    <div class="dsc-status-banner dsc-hidden" id="status-banner"></div>
    <main class="dsc-access-page">
      <section id="login-section" class="dsc-container">
        <div class="dsc-access-layout">
          <div class="dsc-access-management-layout">
            <div class="dsc-access-toolbar">
              <form class="dsc-access-filter-form" id="access-filter-form">
                <button type="button" class="dsc-btn dsc-btn-blue dsc-access-insert-button" id="insert-access-button">Inserir registro</button>
                <input class="dsc-form-control dsc-access-filter-input" id="access-search" type="text" placeholder="Filtrar por codigo, nome ou email" />
                <button type="submit" class="dsc-btn dsc-btn-white">Filtrar</button>
                <button type="button" class="dsc-btn dsc-btn-white" id="clear-filter-button">Limpar</button>
              </form>
            </div>

            <div class="dsc-popup-overlay dsc-hidden" id="access-form-modal" aria-hidden="true">
              <div class="dsc-popup-shell dsc-popup-shell-ordem-servico" role="dialog" aria-modal="true" aria-labelledby="form-title">
                <form class="dsc-card dsc-form dsc-access-form dsc-hidden" id="register-form">
                  <div class="dsc-popup-header dsc-popup-header-sticky">
                    <h2 id="form-title">Cadastro de acesso</h2>
                    <button type="button" class="dsc-btn dsc-btn-white dsc-popup-compact-close-button" id="close-access-form-modal-button" aria-label="Fechar formulario de acesso">X</button>
                  </div>

                  <label class="dsc-field-group" for="nome">
                    <span>Nome</span>
                    <input class="dsc-form-control" id="nome" type="text" placeholder="NOME DO USUARIO" maxlength="50" />
                    <div class="dsc-form-error" id="nome-error"></div>
                  </label>

                  <label class="dsc-field-group" for="email">
                    <span>Email</span>
                    <input class="dsc-form-control" id="email" type="email" placeholder="nome@empresa.com" />
                    <div class="dsc-form-error" id="email-error"></div>
                  </label>

                  <label class="dsc-field-group" for="password">
                    <span>Senha</span>
                    <input class="dsc-form-control" id="password" type="password" placeholder="Digite a senha" />
                    <div class="dsc-form-error" id="password-error"></div>
                  </label>

                  <p class="dsc-form-hint" id="password-hint"></p>

                  <div class="dsc-login-form-buttons dsc-mt20 dsc-access-form-buttons dsc-popup-footer-sticky">
                    <button type="submit" class="dsc-btn dsc-btn-blue" id="save-access-button">Salvar acesso</button>
                    <button type="button" class="dsc-btn dsc-btn-white" id="cancel-access-button">Cancelar</button>
                  </div>

                  <p class="dsc-feedback" id="form-feedback"></p>
                </form>
              </div>
            </div>

            <div class="dsc-card dsc-access-grid-card">
              <div class="dsc-access-grid-header" style="align-items: flex-start; justify-content: space-between; flex-direction: row;">
                <div class="dsc-access-grid-header-copy">
                  <h2>Registros cadastrados</h2>
                  <span id="access-total"></span>
                </div>
                <div class="dsc-grid-page-size-field" style="flex-direction: column; align-items: flex-end; justify-content: flex-start; margin-left: auto;">
                  <span class="dsc-grid-page-size-label">Registros no grid</span>
                  <select class="dsc-form-control" id="access-page-size" style="padding: 0; min-height: 38px; border-radius: 14px;">
                    <option value="10">10</option>
                    <option value="20">20</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                    <option value="200">200</option>
                  </select>
                </div>
              </div>

              <div class="dsc-access-grid-wrapper">
                <table class="dsc-access-grid">
                  <thead>
                    <tr>
                      <th>Codigo</th>
                      <th>Nome</th>
                      <th>
                        <button type="button" class="dsc-grid-sort-button" id="sort-email-button">
                          Email <span id="sort-email-indicator">↑</span>
                        </button>
                      </th>
                      <th class="dsc-grid-actions-column">Acoes</th>
                    </tr>
                  </thead>
                  <tbody id="access-grid-body"></tbody>
                </table>

                <p class="dsc-empty-state dsc-hidden" id="access-empty-state">Nenhum acesso encontrado.</p>
              </div>

              <p class="dsc-feedback" id="grid-feedback"></p>

              <div class="dsc-access-pagination">
                <button type="button" class="dsc-btn dsc-btn-white" id="first-page-button" title="Primeiro registro">|◀</button>
                <button type="button" class="dsc-btn dsc-btn-white" id="previous-page-button" title="Registro anterior">◀</button>
                <span id="pagination-info">Pagina 1 de 1</span>
                <button type="button" class="dsc-btn dsc-btn-white" id="next-page-button" title="Proximo registro">▶</button>
                <button type="button" class="dsc-btn dsc-btn-white" id="last-page-button" title="Ultimo registro">▶|</button>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script>
      const formModal = document.getElementById('access-form-modal');
      const form = document.getElementById('register-form');
      const nomeInput = document.getElementById('nome');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const nomeError = document.getElementById('nome-error');
      const emailError = document.getElementById('email-error');
      const passwordError = document.getElementById('password-error');
      const feedback = document.getElementById('form-feedback');
      const gridFeedback = document.getElementById('grid-feedback');
      const insertAccessButton = document.getElementById('insert-access-button');
      const cancelAccessButton = document.getElementById('cancel-access-button');
      const closeFormModalButton = document.getElementById('close-access-form-modal-button');
      const filterForm = document.getElementById('access-filter-form');
      const clearFilterButton = document.getElementById('clear-filter-button');
      const accessSearchInput = document.getElementById('access-search');
      const accessGridBody = document.getElementById('access-grid-body');
      const accessEmptyState = document.getElementById('access-empty-state');
      const accessTotal = document.getElementById('access-total');
      const firstPageButton = document.getElementById('first-page-button');
      const previousPageButton = document.getElementById('previous-page-button');
      const nextPageButton = document.getElementById('next-page-button');
      const lastPageButton = document.getElementById('last-page-button');
      const paginationInfo = document.getElementById('pagination-info');
      const pageSizeSelect = document.getElementById('access-page-size');
      const sortEmailButton = document.getElementById('sort-email-button');
      const sortEmailIndicator = document.getElementById('sort-email-indicator');
      const formTitle = document.getElementById('form-title');
      const passwordHint = document.getElementById('password-hint');
      const saveAccessButton = document.getElementById('save-access-button');
      const statusBanner = document.getElementById('status-banner');

      const validateEmail = (value) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
      const validateName = (value) => /^[A-ZÀ-Ý ]{1,50}$/.test(value);
      const normalizeName = (value) => value.toUpperCase().replace(/[^A-ZÀ-Ý\s]/g, '').replace(/\s+/g, ' ').trimStart().slice(0, 50);
      let pageSize = 20;

      let currentPage = 1;
      let totalPages = 1;
      let currentSearch = '';
      let currentSortBy = 'codigo';
      let currentSortDirection = 'asc';
      let editingCodigo = null;
      let formMode = 'create';
      let bannerTimeoutId = null;

      const resetMessages = () => {
        nomeError.textContent = '';
        emailError.textContent = '';
        passwordError.textContent = '';
        feedback.textContent = '';
        feedback.className = 'dsc-feedback';
      };

      const resetGridFeedback = () => {
        gridFeedback.textContent = '';
        gridFeedback.className = 'dsc-feedback';
      };

      const showBanner = (message, tone = 'success') => {
        if (bannerTimeoutId) {
          window.clearTimeout(bannerTimeoutId);
        }

        statusBanner.textContent = message;
        statusBanner.className = `dsc-status-banner dsc-status-banner-${tone}`;

        bannerTimeoutId = window.setTimeout(() => {
          statusBanner.className = 'dsc-status-banner dsc-hidden';
          statusBanner.textContent = '';
        }, 3500);
      };

      const readJsonResponse = async (response) => {
        const rawBody = await response.text();

        if (!rawBody) {
          throw new Error('Resposta vazia do servidor.');
        }

        try {
          return JSON.parse(rawBody);
        } catch {
          throw new Error('Resposta invalida do servidor.');
        }
      };

      const getRequestErrorMessage = (error, fallbackMessage) => {
        if (error instanceof TypeError) {
          return 'API indisponivel. Confirme se o backend esta em execucao na porta 3001.';
        }

        if (error instanceof Error && ['Resposta vazia do servidor.', 'Resposta invalida do servidor.'].includes(error.message)) {
          return 'API indisponivel ou respondeu de forma incompleta. Confirme se o backend esta em execucao na porta 3001.';
        }

        return error instanceof Error ? error.message : fallbackMessage;
      };

      const setPopupVisibility = (modalElement, shouldShow) => {
        modalElement.classList.toggle('dsc-hidden', !shouldShow);
        modalElement.setAttribute('aria-hidden', shouldShow ? 'false' : 'true');
      };

      const syncPopupPageState = () => {
        const isPopupVisible = !formModal.classList.contains('dsc-hidden');
        document.body.classList.toggle('dsc-popup-open', isPopupVisible);
      };

      const setFormReadOnly = (isReadOnly) => {
        nomeInput.readOnly = isReadOnly;
        emailInput.readOnly = isReadOnly;
        passwordInput.readOnly = isReadOnly;
        passwordInput.disabled = isReadOnly;
        saveAccessButton.classList.toggle('dsc-hidden', isReadOnly);
      };

      const showForm = (mode = 'create') => {
        const isEditing = mode === 'edit';
        const isReadOnly = mode === 'view';

        formMode = mode;
        form.classList.remove('dsc-hidden');
        setPopupVisibility(formModal, true);
        syncPopupPageState();
        formTitle.textContent = isReadOnly ? 'Consulta de acesso' : isEditing ? 'Alteracao de acesso' : 'Cadastro de acesso';
        saveAccessButton.textContent = isEditing ? 'Salvar alteracao' : 'Salvar acesso';
        passwordHint.textContent = isReadOnly
          ? 'Consulta em modo somente leitura.'
          : isEditing
            ? 'Deixe a senha em branco para manter a atual.'
            : 'Informe email e senha para gravar um novo acesso.';
        setFormReadOnly(isReadOnly);
      };

      const hideForm = () => {
        form.classList.add('dsc-hidden');
        setPopupVisibility(formModal, false);
        syncPopupPageState();
        form.reset();
        editingCodigo = null;
        formMode = 'create';
        setFormReadOnly(false);
        resetMessages();
      };

      const setGridMessage = (message, tone = '') => {
        gridFeedback.textContent = message;
        gridFeedback.className = 'dsc-feedback';
        if (tone) {
          gridFeedback.classList.add(`dsc-feedback-${tone}`);
        }
      };

      const buildAccessUrl = () => {
        const params = new URLSearchParams({
          page: String(currentPage),
          pageSize: String(pageSize),
          sortBy: currentSortBy,
          sortDirection: currentSortDirection,
        });

        if (currentSearch) {
          params.set('search', currentSearch);
        }

        return `/api/access?${params.toString()}`;
      };

      const renderGrid = (items) => {
        accessGridBody.innerHTML = '';

        if (!items.length) {
          accessEmptyState.classList.remove('dsc-hidden');
          return;
        }

        accessEmptyState.classList.add('dsc-hidden');

        items.forEach((item) => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${item.codigo}</td>
            <td>${item.nome}</td>
            <td>${item.email}</td>
            <td>
              <div class="dsc-grid-actions">
                <button type="button" class="dsc-grid-action-button" data-action="view" data-codigo="${item.codigo}" data-nome="${item.nome}" data-email="${item.email}">Consulta</button>
                <button type="button" class="dsc-grid-action-button dsc-grid-action-edit" data-action="edit" data-codigo="${item.codigo}" data-nome="${item.nome}" data-email="${item.email}">Alterar</button>
                <button type="button" class="dsc-grid-action-button dsc-grid-action-delete" data-action="delete" data-codigo="${item.codigo}" data-nome="${item.nome}" data-email="${item.email}">Excluir</button>
              </div>
            </td>
          `;
          accessGridBody.appendChild(row);
        });
      };

      const updatePagination = (totalItems) => {
        accessTotal.textContent = `${totalItems} item(ns) encontrados`;
        paginationInfo.textContent = `Pagina ${currentPage} de ${totalPages}`;
        firstPageButton.disabled = currentPage <= 1;
        previousPageButton.disabled = currentPage <= 1;
        nextPageButton.disabled = currentPage >= totalPages;
        lastPageButton.disabled = currentPage >= totalPages;
        if (pageSizeSelect) {
          pageSizeSelect.value = String(pageSize);
        }
        sortEmailIndicator.textContent = currentSortBy === 'email' && currentSortDirection === 'desc' ? '↓' : '↑';
      };

      const loadAccesses = async () => {
        setGridMessage('Carregando acessos...');

        try {
          const response = await fetch(buildAccessUrl(), {
            headers: {
              Accept: 'application/json',
            },
          });
          const payload = await readJsonResponse(response);

          if (!response.ok) {
            throw new Error(payload.message || 'Falha ao carregar acessos.');
          }

          totalPages = payload.totalPages || 1;
          currentPage = payload.page || 1;
          renderGrid(payload.items || []);
          updatePagination(payload.total || 0);
          setGridMessage(payload.items && payload.items.length ? '' : 'Nenhum acesso encontrado.');
        } catch (error) {
          accessGridBody.innerHTML = '';
          accessEmptyState.classList.remove('dsc-hidden');
          setGridMessage(getRequestErrorMessage(error, 'Falha ao carregar acessos.'), 'error');
        }
      };

      const startInsert = () => {
        editingCodigo = null;
        form.reset();
        nomeInput.value = '';
        resetMessages();
        showForm('create');
      };

      const startEdit = (item) => {
        editingCodigo = item.codigo;
        nomeInput.value = item.nome;
        emailInput.value = item.email;
        passwordInput.value = '';
        resetMessages();
        showForm('edit');
      };

      const startView = (item) => {
        editingCodigo = item.codigo;
        nomeInput.value = item.nome;
        emailInput.value = item.email;
        passwordInput.value = '';
        resetMessages();
        showForm('view');
      };

      const handleDelete = async (item) => {
        if (!window.confirm(`Excluir o acesso ${item.codigo} - ${item.nome}?`)) {
          return;
        }

        setGridMessage(`Excluindo acesso ${item.codigo}...`);

        try {
          const response = await fetch(`/api/access/${encodeURIComponent(item.codigo)}`, {
            method: 'DELETE',
            headers: { Accept: 'application/json' },
          });
          const payload = await readJsonResponse(response);

          if (!response.ok) {
            throw new Error(payload.message || 'Falha ao excluir acesso.');
          }

          setGridMessage('Acesso excluido com sucesso.', 'success');
          showBanner(`Acesso ${item.codigo} excluido com sucesso.`, 'success');
          if (editingCodigo === item.codigo) {
            hideForm();
          }
          await loadAccesses();
        } catch (error) {
          const message = getRequestErrorMessage(error, 'Falha ao excluir acesso.');
          setGridMessage(message, 'error');
          showBanner(message, 'error');
        }
      };

      accessGridBody.addEventListener('click', (event) => {
        const target = event.target;

        if (!(target instanceof HTMLButtonElement)) {
          return;
        }

        const { action, codigo, nome, email } = target.dataset;

        if (!codigo || !email || !nome) {
          return;
        }

        const item = { codigo, nome, email };

        if (action === 'view') {
          startView(item);
          return;
        }

        if (action === 'edit') {
          startEdit(item);
          return;
        }

        if (action === 'delete') {
          void handleDelete(item);
        }
      });

      nomeInput.addEventListener('input', () => {
        nomeInput.value = normalizeName(nomeInput.value);
      });

      form.addEventListener('submit', async (event) => {
        event.preventDefault();

        const nome = normalizeName(nomeInput.value);
        const email = emailInput.value.trim();
        const password = passwordInput.value.trim();
        let hasError = false;

        resetMessages();

        if (formMode === 'view') {
          feedback.textContent = 'Consulta em modo somente leitura.';
          return;
        }

        nomeInput.value = nome;

        if (!nome) {
          nomeError.textContent = 'Informe o nome.';
          hasError = true;
        } else if (!validateName(nome)) {
          nomeError.textContent = 'Use apenas letras maiusculas e no maximo 50 caracteres.';
          hasError = true;
        }

        if (!email) {
          emailError.textContent = 'Informe o email.';
          hasError = true;
        } else if (!validateEmail(email)) {
          emailError.textContent = 'Digite um email valido.';
          hasError = true;
        }

        if (!password && !editingCodigo) {
          passwordError.textContent = 'Informe a senha.';
          hasError = true;
        }

        if (hasError) {
          feedback.textContent = 'Corrija os campos para continuar.';
          feedback.classList.add('dsc-feedback-error');
          return;
        }

        try {
          const response = await fetch(editingCodigo ? `/api/access/${encodeURIComponent(editingCodigo)}` : '/api/access', {
            method: editingCodigo ? 'PUT' : 'POST',
            headers: {
              'Content-Type': 'application/json',
              Accept: 'application/json',
            },
            body: JSON.stringify({ nome, email, password }),
          });

          const payload = await readJsonResponse(response);

          if (!response.ok) {
            throw new Error(payload.message || 'Falha ao gravar acesso.');
          }

          const savedItem = payload.item || payload.user;
          feedback.textContent = editingCodigo
            ? `Acesso ${savedItem.codigo} alterado com sucesso.`
            : `Acesso ${savedItem.codigo} gravado com sucesso.`;
          feedback.classList.add('dsc-feedback-success');
          showBanner(
            editingCodigo
              ? `Acesso ${savedItem.codigo} alterado com sucesso.`
              : `Acesso ${savedItem.codigo} gravado com sucesso.`,
            'success',
          );
          hideForm();
          await loadAccesses();
        } catch (error) {
          const message = getRequestErrorMessage(error, 'Falha ao gravar acesso.');
          feedback.textContent = message;
          feedback.classList.add('dsc-feedback-error');
          showBanner(message, 'error');
        }
      });

      insertAccessButton.addEventListener('click', startInsert);
      cancelAccessButton.addEventListener('click', hideForm);
      closeFormModalButton.addEventListener('click', hideForm);

      formModal.addEventListener('click', (event) => {
        if (event.target === formModal) {
          hideForm();
        }
      });

      window.addEventListener('keydown', (event) => {
        if (event.key === 'Escape' && !formModal.classList.contains('dsc-hidden')) {
          hideForm();
        }
      });

      filterForm.addEventListener('submit', (event) => {
        event.preventDefault();
        currentSearch = accessSearchInput.value.trim();
        currentPage = 1;
        void loadAccesses();
      });

      clearFilterButton.addEventListener('click', () => {
        accessSearchInput.value = '';
        currentSearch = '';
        currentPage = 1;
        void loadAccesses();
      });

      firstPageButton.addEventListener('click', () => {
        if (currentPage <= 1) {
          return;
        }

        currentPage = 1;
        void loadAccesses();
      });

      previousPageButton.addEventListener('click', () => {
        if (currentPage <= 1) {
          return;
        }

        currentPage -= 1;
        void loadAccesses();
      });

      nextPageButton.addEventListener('click', () => {
        if (currentPage >= totalPages) {
          return;
        }

        currentPage += 1;
        void loadAccesses();
      });

      lastPageButton.addEventListener('click', () => {
        if (currentPage >= totalPages) {
          return;
        }

        currentPage = totalPages;
        void loadAccesses();
      });

      pageSizeSelect?.addEventListener('change', () => {
        const nextPageSize = Number.parseInt(pageSizeSelect.value, 10);

        if (!Number.isFinite(nextPageSize) || nextPageSize <= 0) {
          pageSizeSelect.value = String(pageSize);
          return;
        }

        pageSize = nextPageSize;
        currentPage = 1;
        void loadAccesses();
      });

      sortEmailButton.addEventListener('click', () => {
        currentSortBy = 'email';
        currentSortDirection = currentSortDirection === 'asc' ? 'desc' : 'asc';
        currentPage = 1;
        void loadAccesses();
      });

      hideForm();
      void loadAccesses();
    </script>
  </body>
</html>
