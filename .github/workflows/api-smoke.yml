name: API Smoke

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      suite:
        description: Suite de smoke para executar
        required: true
        default: all
        type: choice
        options:
          - all
          - condutor
          - credenciada

jobs:
  smoke:
    name: Smoke API (${{ matrix.suite }})
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.suite == 'all' || github.event.inputs.suite == matrix.suite
    strategy:
      fail-fast: false
      matrix:
        suite:
          - condutor
          - credenciada

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 12345
          POSTGRES_DB: teg_financ
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d teg_financ"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PGHOST: localhost
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: 12345
      PGDATABASE: teg_financ
      PORT: 3001
      API_BASE_URL: http://localhost:3001

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start API
        run: node server.js > api.log 2>&1 &

      - name: Wait for API
        run: |
          for i in {1..30}; do
            if curl -fsS "http://localhost:3001/api/condutor?page=1&pageSize=1" > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "API did not become ready in time"
          cat api.log
          exit 1

      - name: Run smoke suite
        shell: bash
        run: |
          mkdir -p .artifacts
          set -o pipefail
          SMOKE_REPORT_PATH=.artifacts/smoke-report-${{ matrix.suite }}.json npm run smoke:api:${{ matrix.suite }} 2>&1 | tee .artifacts/smoke-${{ matrix.suite }}.log

      - name: Build failure summary artifact
        if: failure()
        shell: bash
        env:
          SMOKE_SUITE: ${{ matrix.suite }}
        run: |
          node <<'EOF'
          const fs = require('node:fs')

          const suite = process.env.SMOKE_SUITE
          const reportPath = `.artifacts/smoke-report-${suite}.json`
          const smokeLogPath = `.artifacts/smoke-${suite}.log`
          const apiLogPath = 'api.log'
          const summaryPath = `.artifacts/failure-summary-${suite}.md`

          const report = fs.existsSync(reportPath)
            ? JSON.parse(fs.readFileSync(reportPath, 'utf8'))
            : null
          const smokeLog = fs.existsSync(smokeLogPath)
            ? fs.readFileSync(smokeLogPath, 'utf8')
            : 'Smoke log indisponivel.'
          const apiLog = fs.existsSync(apiLogPath)
            ? fs.readFileSync(apiLogPath, 'utf8')
            : 'API log indisponivel.'
          const imports = report?.executedSuites?.flatMap((suiteReport) => suiteReport.imports ?? []) ?? []

          const importLines = imports.length
            ? imports.map((item) => `- ${item.label} (${item.fileName}): total=${item.total}, processed=${item.processed}, inserted=${item.inserted}, updated=${item.updated}, skipped=${item.skipped}`).join('\n')
            : '- Nenhum log de importacao registrado.'

          const content = [
            '# Smoke API Failure Summary',
            '',
            `- Suite: ${suite}`,
            `- Status: ${report?.status ?? 'failed'}`,
            `- Failure: ${report?.failureMessage ?? 'Nao informado'}`,
            `- Started at: ${report?.startedAt ?? 'n/a'}`,
            `- Finished at: ${report?.finishedAt ?? 'n/a'}`,
            '',
            '## Import Logs',
            '',
            importLines,
            '',
            '## Smoke Log Tail',
            '',
            '```text',
            ...smokeLog.split('\n').slice(-60),
            '```',
            '',
            '## API Log Tail',
            '',
            '```text',
            ...apiLog.split('\n').slice(-60),
            '```',
            '',
          ].join('\n')

          fs.writeFileSync(summaryPath, content)
          EOF

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-failure-${{ matrix.suite }}
          path: |
            api.log
            .artifacts/smoke-${{ matrix.suite }}.log
            .artifacts/smoke-report-${{ matrix.suite }}.json
            .artifacts/failure-summary-${{ matrix.suite }}.md